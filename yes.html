<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Anniversary ❤️</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background: #ffe6eb;
      margin-top: 100px;
    }

    h1 {
      font-size: 2.5em;
      color: #ff4d6d;
    }

    .buttons {
      margin-top: 30px;
      position: relative;
      height: 200px;
    }

    button {
      font-size: 18px;
      padding: 12px 25px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #yesBtn {
      background-color: #ff4d6d;
      color: white;
    }

    #noBtn {
      background-color: #999;
      color: white;
      position: absolute;
    }
  </style>
</head>
<body>

  <h1>Happy Anniversary, Love ❤️</h1>
  <p>Will you stay with me forever?</p>

  <div class="buttons">
    <button id="yesBtn">Yes 💕</button>
    <button id="noBtn">No 😢</button>
  </div>

  <script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");

    noBtn.addEventListener("mouseover", () => {
      const x = Math.random() * 300;
      const y = Math.random() * 150;
      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    });

    yesBtn.addEventListener("click", () => {
      document.body.innerHTML = `
        <h1 style="color:#ff4d6d;">I love you always ❤️</h1>
        <p>Happy Anniversary 🥰</p>
      `;
    });
  </script>

</body>
